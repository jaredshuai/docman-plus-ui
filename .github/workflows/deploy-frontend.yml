name: Deploy Frontend

on:
  push:
    branches:
      - dev
      - release
  workflow_dispatch:

jobs:
  deploy:
    runs-on:
      - self-hosted
      - linux
      - x64
      - frontend
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Resolve environment
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_NAME}" == "release" ]]; then
            echo "DEPLOY_ENV=release" >> "$GITHUB_ENV"
            echo "WEB_PORT=18080" >> "$GITHUB_ENV"
            echo "API_PORT=18081" >> "$GITHUB_ENV"
            echo "SNAIL_UI_PORT=18800" >> "$GITHUB_ENV"
            echo "BUILD_CMD=build:prod" >> "$GITHUB_ENV"
          else
            echo "DEPLOY_ENV=dev" >> "$GITHUB_ENV"
            echo "WEB_PORT=28080" >> "$GITHUB_ENV"
            echo "API_PORT=28081" >> "$GITHUB_ENV"
            echo "SNAIL_UI_PORT=28800" >> "$GITHUB_ENV"
            echo "BUILD_CMD=build:dev" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        shell: bash
        run: npm install

      - name: Build frontend
        shell: bash
        run: npm run "${BUILD_CMD}"

      - name: Install nginx if needed
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v nginx >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y nginx
          fi
          sudo systemctl enable nginx

      - name: Sync static files
        shell: bash
        run: |
          set -euo pipefail
          TARGET_DIR="/srv/docman/${DEPLOY_ENV}/ui/dist"
          sudo mkdir -p "$TARGET_DIR"
          sudo rm -rf "${TARGET_DIR:?}/"*
          sudo cp -r dist/. "$TARGET_DIR/"
          sudo chown -R root:root "/srv/docman/${DEPLOY_ENV}/ui"

      - name: Write nginx config
        shell: bash
        run: |
          set -euo pipefail
          sudo mkdir -p /etc/nginx/sites-available /etc/nginx/sites-enabled
          sudo tee /etc/nginx/sites-available/docman.conf >/dev/null <<'EOF'
          server {
              listen 18080;
              server_name _;

              root /srv/docman/release/ui/dist;
              index index.html;

              location / {
                  try_files $uri $uri/ /index.html;
              }

              location /prod-api/ {
                  proxy_pass http://127.0.0.1:18081/;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }

              location /snail-job/ {
                  proxy_pass http://127.0.0.1:18800/;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
          }

          server {
              listen 28080;
              server_name _;

              root /srv/docman/dev/ui/dist;
              index index.html;

              location / {
                  try_files $uri $uri/ /index.html;
              }

              location /prod-api/ {
                  proxy_pass http://127.0.0.1:28081/;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }

              location /snail-job/ {
                  proxy_pass http://127.0.0.1:28800/;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
          }
          EOF

          sudo rm -f /etc/nginx/sites-enabled/default
          sudo ln -sf /etc/nginx/sites-available/docman.conf /etc/nginx/sites-enabled/docman.conf
          sudo nginx -t
          sudo systemctl restart nginx

      - name: Show nginx listeners
        shell: bash
        run: |
          ss -ltnp | grep -E ':18080 |:28080 ' || true
